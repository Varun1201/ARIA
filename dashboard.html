<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f8f7;
    --surface: #ffffff;
    --surface-1: #f1f0eb;
    --text: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --border-strong: rgba(11,11,11,0.18);
    --radius: 8px;
    --accent: #2a78d6;
    --accent-hover: #1a68c6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface-1: #232321;
      --text: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.18);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .title-row { display: flex; align-items: center; gap: 10px; }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
  .b-healthy { background: #EAF3DE; color: #3B6D11; }
  .b-degraded { background: #FAEEDA; color: #854F0B; }
  .b-critical { background: #FCEBEB; color: #A32D2D; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .d-healthy { background: #639922; } .d-degraded { background: #BA7517; } .d-critical { background: #E24B4A; }
  .actions-row { display: flex; gap: 8px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; transition: background .15s; text-decoration: none; }
  .btn:hover { background: var(--surface-1); }
  .btn-primary { background: var(--accent); color: white; border-color: transparent; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
  .btn-success:hover { background: #C0DD97; }
  .btn-sm { padding: 4px 9px; font-size: 12px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .grid2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; margin-bottom: 1.25rem; }
  @media (max-width: 700px) { .grid4 { grid-template-columns: repeat(2,1fr); } .grid2 { grid-template-columns: 1fr; } }
  .mcard { background: var(--surface-1); border-radius: var(--radius); padding: 1rem; }
  .mlabel { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .mval { font-size: 24px; font-weight: 500; }
  .msub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .sec-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
  .anomaly-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .anomaly-item:last-child { border-bottom: none; }
  .sev { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .sev-critical { background: #FCEBEB; color: #A32D2D; }
  .sev-high, .sev-medium { background: #FAEEDA; color: #854F0B; }
  .sev-low { background: #EAF3DE; color: #3B6D11; }
  .anom-body { flex: 1; min-width: 0; }
  .anom-type { font-size: 13px; font-weight: 500; }
  .anom-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .anom-cause { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-style: italic; }
  .anom-btns { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
  .qrow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .qrow:last-child { border-bottom: none; }
  .qtext { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .pill { padding: 2px 7px; border-radius: 4px; font-weight: 500; font-size: 11px; }
  .pill-good { background: #EAF3DE; color: #3B6D11; }
  .pill-warn { background: #FAEEDA; color: #854F0B; }
  .pill-bad { background: #FCEBEB; color: #A32D2D; }
  .flagged { background: #FCEBEB; color: #A32D2D; font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .doc-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .doc-row:last-child { border-bottom: none; }
  .fetch-row { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  select { font-size: 13px; padding: 6px 8px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); font-family: inherit; cursor: pointer; }
  .no-data { font-size: 13px; color: var(--text-muted); text-align: center; padding: 2rem 0; }
  .last-upd { font-size: 12px; color: var(--text-muted); }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 99; display: none; max-width: 320px; line-height: 1.4; }
  .toast.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin .8s linear infinite; display: inline-block; }
  .legend-line { display: inline-block; width: 10px; height: 2px; vertical-align: middle; margin-right: 4px; }
</style>
</head>
<body>
<div class="container">

  <!-- Top bar -->
  <div class="topbar">
    <div class="title-row">
      <span class="title">ARIA</span>
      <span id="status-badge" class="badge b-degraded"><span class="dot d-degraded"></span> loading</span>
    </div>
    <div class="actions-row">
      <span class="last-upd" id="last-upd">—</span>
      <button class="btn" onclick="fetchAll()">
        <i class="ti ti-refresh" id="refresh-icon"></i> Refresh
      </button>
      <button class="btn btn-primary" onclick="triggerCheck()">
        <i class="ti ti-shield-check"></i> Run check
      </button>
    </div>
  </div>

  <!-- Metric cards -->
  <div class="grid4">
    <div class="mcard"><div class="mlabel">Total queries</div><div class="mval" id="m-total">—</div></div>
    <div class="mcard"><div class="mlabel">Avg faithfulness</div><div class="mval" id="m-faith">—</div><div class="msub" id="m-faith-sub"></div></div>
    <div class="mcard"><div class="mlabel">Hallucination rate</div><div class="mval" id="m-hall">—</div></div>
    <div class="mcard"><div class="mlabel">Active anomalies</div><div class="mval" id="m-anom">—</div></div>
  </div>

  <!-- Charts + Anomalies -->
  <div class="grid2">
    <div class="card">
      <div class="sec-title">Score timeline — last 20 queries</div>
      <div style="position:relative;height:200px"><canvas id="scoreChart"></canvas></div>
      <div style="display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--text-secondary)">
        <span><span class="legend-line" style="background:#2a78d6"></span>Faithfulness</span>
        <span><span class="legend-line" style="background:#1baf7a"></span>Relevance</span>
        <span><span class="legend-line" style="background:#e34948"></span>Hallucination</span>
      </div>
    </div>

    <div class="card">
      <div class="sec-title">Anomaly control panel</div>
      <div id="anomaly-list"><div class="no-data">No anomalies detected</div></div>
    </div>
  </div>

  <!-- Queries + Corpus -->
  <div class="grid2">
    <div class="card">
      <div class="sec-title">Recent queries</div>
      <div id="query-list"><div class="no-data">No queries yet</div></div>
    </div>

    <div class="card">
      <div class="sec-title">Document corpus</div>
      <div id="doc-stats"><div class="no-data">No documents ingested</div></div>

      <div class="sec-title" style="margin-top:1.25rem">Fetch arXiv papers</div>
      <div class="fetch-row">
        <select id="cluster-select">
          <option value="rag">RAG</option>
          <option value="llm_foundation">LLM foundations</option>
          <option value="agents">Agents</option>
          <option value="multimodal">Multimodal</option>
          <option value="evaluation">Evaluation</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="fetchPapers()">
          <i class="ti ti-download"></i> Fetch
        </button>
        <button class="btn btn-sm" onclick="checkStaleness()">
          <i class="ti ti-clock"></i> Staleness
        </button>
      </div>
      <div id="fetch-status" style="font-size:12px;color:var(--text-muted);margin-top:6px;line-height:1.4"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'http://localhost:8000';
let scoreChart = null;

// ── Utilities ──────────────────────────────────────────────────────────────

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type === 'success' ? '#C0DD97' : type === 'error' ? '#F09595' : 'var(--border-strong)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function scoreClass(v) {
  return v >= 0.7 ? 'pill-good' : v >= 0.4 ? 'pill-warn' : 'pill-bad';
}

function setStatus(status, count) {
  const el = document.getElementById('status-badge');
  const cls = status === 'healthy' ? 'b-healthy' : status === 'critical' ? 'b-critical' : 'b-degraded';
  const dcls = status === 'healthy' ? 'd-healthy' : status === 'critical' ? 'd-critical' : 'd-degraded';
  el.className = `badge ${cls}`;
  el.innerHTML = `<span class="dot ${dcls}"></span> ${status}${count > 0 ? ' · ' + count + ' anomal' + (count === 1 ? 'y' : 'ies') : ''}`;
}

// ── Data fetching ──────────────────────────────────────────────────────────

async function fetchAll() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  try {
    const res = await fetch(`${BASE}/dashboard/metrics`);
    if (!res.ok) throw new Error('not ok');
    const d = await res.json();
    render(d);
    document.getElementById('last-upd').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch {
    document.getElementById('last-upd').textContent = 'Cannot connect — is ARIA running at localhost:8000?';
  }
  icon.classList.remove('spinning');
}

// ── Rendering ──────────────────────────────────────────────────────────────

function render(d) {
  const q = d.queries || {};
  const h = d.health || {};

  setStatus(h.status || 'healthy', h.active_anomalies || 0);

  document.getElementById('m-total').textContent = q.total || 0;
  const faith = q.avg_faithfulness || 0;
  document.getElementById('m-faith').textContent = (faith * 100).toFixed(0) + '%';
  document.getElementById('m-faith-sub').textContent = faith >= 0.7 ? '✓ above threshold' : '⚠ below 0.75 threshold';
  document.getElementById('m-hall').textContent = ((q.hallucination_flag_rate || 0) * 100).toFixed(0) + '%';
  document.getElementById('m-anom').textContent = h.active_anomalies || 0;

  renderChart(q.recent || []);
  renderAnomalies(d.anomalies || []);
  renderQueries(q.recent || []);
  renderDocs(d.documents || {});
}

function renderChart(recent) {
  const labels = recent.map((_, i) => 'Q' + (i + 1));
  if (scoreChart) scoreChart.destroy();
  scoreChart = new Chart(document.getElementById('scoreChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Faithfulness', data: recent.map(r => parseFloat((r.faithfulness_score * 100).toFixed(1))), borderColor: '#2a78d6', backgroundColor: 'transparent', tension: 0.3, borderWidth: 2, pointRadius: 3 },
        { label: 'Relevance', data: recent.map(r => parseFloat((r.relevance_score * 100).toFixed(1))), borderColor: '#1baf7a', backgroundColor: 'transparent', tension: 0.3, borderWidth: 2, pointRadius: 3 },
        { label: 'Hallucination', data: recent.map(r => parseFloat((r.hallucination_score * 100).toFixed(1))), borderColor: '#e34948', backgroundColor: 'transparent', tension: 0.3, borderWidth: 2, pointRadius: 3, borderDash: [4, 3] },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { min: 0, max: 100, ticks: { callback: v => v + '%', font: { size: 11 } }, grid: { color: 'rgba(128,128,128,0.1)' } },
        x: { ticks: { font: { size: 11 }, autoSkip: true, maxTicksLimit: 8 }, grid: { display: false } }
      }
    }
  });
}

function renderAnomalies(anomalies) {
  const el = document.getElementById('anomaly-list');
  if (!anomalies.length) {
    el.innerHTML = '<div class="no-data">No anomalies detected</div>';
    return;
  }
  el.innerHTML = anomalies.slice(0, 5).map(a => `
    <div class="anomaly-item">
      <span class="sev sev-${a.severity}">${a.severity}</span>
      <div class="anom-body">
        <div class="anom-type">${(a.anomaly_type || '').replace(/_/g, ' ')}</div>
        <div class="anom-desc" title="${a.description || ''}">${a.description || ''}</div>
        ${a.root_cause ? `<div class="anom-cause">${a.root_cause.slice(0, 80)}...</div>` : ''}
      </div>
      <div class="anom-btns">
        ${a.remediation_status === 'pending' && !a.remediation_action
          ? `<button class="btn btn-sm" onclick="diagnose(${a.id})" title="Run root cause analysis"><i class="ti ti-brain"></i> Diagnose</button>`
          : ''}
        ${a.remediation_status === 'pending' && a.remediation_action
          ? `<button class="btn btn-success btn-sm" onclick="approve(${a.id})" title="Approve ${a.remediation_action}"><i class="ti ti-check"></i> Approve</button>`
          : ''}
        <button class="btn btn-sm" onclick="resolve(${a.id})" title="Mark resolved"><i class="ti ti-x"></i></button>
      </div>
    </div>`).join('');
}

function renderQueries(recent) {
  const el = document.getElementById('query-list');
  if (!recent.length) {
    el.innerHTML = '<div class="no-data">No queries yet</div>';
    return;
  }
  el.innerHTML = recent.slice().reverse().slice(0, 8).map(r => `
    <div class="qrow">
      <span class="qtext" title="${r.query_text || ''}">${r.query_text || '—'}</span>
      <span class="pill ${scoreClass(r.faithfulness_score)}">${(r.faithfulness_score * 100).toFixed(0)}%</span>
      ${r.is_flagged ? '<span class="flagged">flagged</span>' : ''}
    </div>`).join('');
}

function renderDocs(docs) {
  const el = document.getElementById('doc-stats');
  if (!Object.keys(docs).length) {
    el.innerHTML = '<div class="no-data">No documents ingested</div>';
    return;
  }
  const total = Object.values(docs).reduce((a, b) => a + b, 0);
  el.innerHTML = Object.entries(docs).map(([status, count]) => `
    <div class="doc-row">
      <span style="text-transform:capitalize">${status}</span>
      <span style="font-weight:500">${count}<span style="color:var(--text-muted);font-weight:400"> / ${total}</span></span>
    </div>`).join('');
}

// ── Actions ────────────────────────────────────────────────────────────────

async function triggerCheck() {
  try {
    const res = await fetch(`${BASE}/monitor/check`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '""' });
    const d = await res.json();
    toast(`Check complete — ${d.active_anomalies} active anomal${d.active_anomalies === 1 ? 'y' : 'ies'}`);
    await fetchAll();
  } catch { toast('Check failed', 'error'); }
}

async function diagnose(id) {
  toast(`Running root cause analysis on anomaly #${id}...`);
  try {
    const res = await fetch(`${BASE}/monitor/anomalies/${id}/diagnose`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '""' });
    const d = await res.json();
    const cause = (d.diagnosis?.root_cause || '').slice(0, 80);
    const action = d.diagnosis?.recommended_action || '';
    toast(`Diagnosed: ${cause}... → ${action}`);
    await fetchAll();
  } catch { toast('Diagnosis failed', 'error'); }
}

async function approve(id) {
  toast(`Approving remediation #${id} — healing loop starting...`);
  try {
    const res = await fetch(`${BASE}/monitor/anomalies/${id}/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ confirmed: true })
    });
    const d = await res.json();
    toast(d.message || 'Healing loop complete', 'success');
    await fetchAll();
  } catch { toast('Approval failed', 'error'); }
}

async function resolve(id) {
  try {
    await fetch(`${BASE}/monitor/anomalies/${id}/resolve`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '""' });
    toast(`Anomaly #${id} resolved`, 'success');
    await fetchAll();
  } catch { toast('Resolve failed', 'error'); }
}

async function fetchPapers() {
  const cluster = document.getElementById('cluster-select').value;
  document.getElementById('fetch-status').textContent = `Fetching ${cluster} papers in background...`;
  try {
    const res = await fetch(`${BASE}/arxiv/fetch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cluster, max_per_query: 2 })
    });
    const d = await res.json();
    document.getElementById('fetch-status').textContent = `Started — ~${d.estimated_papers} papers queued. Check corpus stats in a few minutes.`;
    toast(`Fetching ${cluster} papers in background`);
  } catch {
    document.getElementById('fetch-status').textContent = 'Fetch failed — is ARIA running?';
    toast('Fetch failed', 'error');
  }
}

async function checkStaleness() {
  try {
    const res = await fetch(`${BASE}/arxiv/staleness`);
    const d = await res.json();
    const s = d.staleness || {};
    const stats = d.corpus_stats || {};
    const msg = s.is_stale
      ? `Corpus is stale — newest doc is ${s.newest_doc_age_days} days old`
      : `Corpus is fresh — ${stats.total_chunks || 0} chunks across ${(stats.document_counts?.indexed || 0)} docs`;
    document.getElementById('fetch-status').textContent = msg;
    toast(msg, s.is_stale ? 'error' : 'success');
  } catch { toast('Staleness check failed', 'error'); }
}

// ── Init ───────────────────────────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, 30000);
</script>
</body>
</html>
