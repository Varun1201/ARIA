version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aria_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: aria_postgres
    environment:
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: aria_secret
      POSTGRES_DB: aria_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aria_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_storage:
